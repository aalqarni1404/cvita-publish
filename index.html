<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CVita — The Living Career Story Platform</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0f1c;--surf:#111827;--card:#161e2e;--brd:#1f2d42;--brd2:#2a3f5a;
  --txt:#f0f4ff;--mid:#8899bb;--mute:#3d5070;
  --blue:#3b82f6;--bluedark:#1d4ed8;--bluebg:#0f1f3d;
  --gold:#f59e0b;--goldbg:#1c1200;
  --green:#10b981;--greenbg:#052e1a;
  --purple:#8b5cf6;--purpledark:#6d28d9;--purplebg:#1a0f35;
  --red:#ef4444;--redbg:#2a0a0a;
  --teal:#06b6d4;--orange:#f97316;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'DM Mono',monospace;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes glow{0%,100%{box-shadow:0 0 20px #3b82f633}50%{box-shadow:0 0 40px #3b82f666}}
.page{animation:fadeUp .25s ease;min-height:calc(100vh - 54px)}
/* NAV */
#nav{position:sticky;top:0;z-index:100;background:rgba(11,15,28,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--brd);height:54px;display:flex;align-items:center;padding:0 20px;gap:6px}
.logo{display:flex;align-items:center;gap:8px;cursor:pointer;margin-right:10px;text-decoration:none}
.logo-hex{width:26px;height:26px;background:linear-gradient(135deg,var(--blue),var(--purple));clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%)}
.logo-text{font-family:'Playfair Display',serif;font-size:17px;font-weight:900;color:var(--txt)}
.logo-text span{color:var(--blue)}
.nav-btn{background:transparent;border:1px solid transparent;color:var(--mid);padding:5px 11px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;border-radius:7px;white-space:nowrap;transition:all .15s}
.nav-btn:hover{background:var(--card);color:var(--txt)}
.nav-btn.active{background:var(--bluebg);border-color:#3b82f655;color:var(--blue);font-weight:700}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;margin-left:auto;flex-shrink:0}
/* SHARED */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:'DM Mono',monospace;font-weight:700;cursor:pointer;border-radius:8px;border:none;transition:all .15s;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,var(--blue),var(--bluedark));color:#fff;box-shadow:0 4px 14px #3b82f644;padding:10px 22px;font-size:12px}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px #3b82f655}
.btn-gold{background:linear-gradient(135deg,var(--gold),#d97706);color:#fff;padding:10px 22px;font-size:12px}
.btn-ghost{background:transparent;color:var(--mid);border:1px solid var(--brd2);padding:8px 18px;font-size:11px}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue)}
.btn-sm{padding:6px 14px;font-size:10px}
.btn-purple{background:linear-gradient(135deg,var(--purple),var(--purpledark));color:#fff;padding:10px 22px;font-size:12px}
.btn-danger{background:var(--redbg);color:var(--red);border:1px solid #ef444444;padding:8px 16px;font-size:11px}
.btn-full{width:100%}
.card{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:18px}
.card-hover{transition:all .2s;cursor:pointer}
.card-hover:hover{border-color:var(--blue);box-shadow:0 4px 20px #3b82f618}
.pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;white-space:nowrap}
.section-label{font-size:9px;color:var(--mute);letter-spacing:2px;margin-bottom:10px}
.bar-wrap{height:4px;background:var(--brd);border-radius:2px;overflow:hidden;margin-top:3px}
.bar-fill{height:100%;border-radius:2px;transition:width .4s}
.tag-chip{font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid;cursor:pointer;transition:all .13s}
h1,h2,h3{font-family:'Playfair Display',serif}
/* GRID HELPERS */
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.grid-4{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
/* TOPBAR (sub-nav) */
.topbar{background:var(--surf);border-bottom:1px solid var(--brd);padding:0 20px;height:48px;display:flex;align-items:center;gap:12px;position:sticky;top:54px;z-index:40}
/* SIDEBAR LAYOUT */
.sidebar-layout{display:grid;grid-template-columns:185px 1fr 250px;height:calc(100vh - 102px);overflow:hidden}
.sidebar{border-right:1px solid var(--brd);background:var(--surf);padding:10px 8px;overflow-y:auto}
.main-panel{overflow-y:auto;padding:20px 22px;background:var(--bg)}
.right-panel{border-left:1px solid var(--brd);background:var(--surf);padding:14px;overflow-y:auto}
.sidebar-item{padding:8px 11px;margin-bottom:2px;cursor:pointer;border-radius:7px;border-left:2px solid transparent;display:flex;justify-content:space-between;align-items:center;transition:all .13s;font-size:11px;color:var(--mute)}
.sidebar-item:hover{background:var(--card);color:var(--txt)}
.sidebar-item.active{background:var(--bluebg);color:var(--blue);border-left-color:var(--blue);font-weight:700}
/* TOOLTIPS / ALERTS */
.alert{border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;gap:10px;align-items:center;font-size:12px}
.alert-green{background:var(--greenbg);border:1px solid #10b98144;color:var(--green)}
.alert-purple{background:var(--purplebg);border:1px solid #8b5cf644;color:var(--purple)}
.alert-gold{background:var(--goldbg);border:1px solid #f59e0b44;color:var(--gold)}
/* MODAL */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
#modal-overlay.open{display:flex}
#modal-box{background:var(--surf);border:1px solid var(--brd2);border-radius:16px;padding:28px;max-width:480px;width:90%;animation:fadeUp .2s ease}
</style>
</head>
<body>

<!-- NAV -->
<nav id="nav">
  <div class="logo" onclick="goto('landing')">
    <div class="logo-hex"></div>
    <div class="logo-text">CV<span>ita</span></div>
  </div>
  <button class="nav-btn active" id="nav-landing"   onclick="goto('landing')">🏠 Home</button>
  <button class="nav-btn"        id="nav-dashboard" onclick="goto('dashboard')">👤 Dashboard</button>
  <button class="nav-btn"        id="nav-market"    onclick="goto('market')">🛒 Market</button>
  <button class="nav-btn"        id="nav-jobs"      onclick="goto('jobs')">💼 Jobs</button>
  <button class="nav-btn"        id="nav-recruiter" onclick="goto('recruiter')">🔍 Recruiter</button>
  <button class="nav-btn"        id="nav-agents"    onclick="goto('agents')">🤖 AI Agents</button>
  <button class="nav-btn"        id="nav-pricing"   onclick="goto('pricing')">💰 Pricing</button>
  <div class="live-dot" title="Live"></div>
</nav>

<!-- PAGES CONTAINER -->
<div id="app"></div>

<!-- MODAL -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal-box" onclick="event.stopPropagation()">
    <div id="modal-content"></div>
    <button class="btn btn-ghost btn-sm" style="margin-top:16px" onclick="closeModal()">Close</button>
  </div>
</div>

// ─── ROUTER ────────────────────────────────────────────────────────────────
let currentPage = 'landing';
function goto(page){
  currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nb = document.getElementById('nav-'+page);
  if(nb) nb.classList.add('active');
  const app = document.getElementById('app');
  app.innerHTML = '';
  const div = document.createElement('div');
  div.className = 'page';
  div.innerHTML = PAGES[page]();
  app.appendChild(div);
  setTimeout(()=>{ if(INITS[page]) INITS[page](); },10);
  window.scrollTo(0,0);
}
function openModal(html){ document.getElementById('modal-content').innerHTML=html; document.getElementById('modal-overlay').classList.add('open'); }
function closeModal(e){ if(!e||e.target===document.getElementById('modal-overlay')) document.getElementById('modal-overlay').classList.remove('open'); }

  const proPlan = [
    {id:'free',name:'Free',price:0,c:'var(--mute)',tag:'',features:['Basic CV — 5 sections','3 hashtags','1 knowledge item','PDF export (watermark)','2 AI credits/month','Public profile'],missing:['All 10 CV sections','Knowledge monetization','Patents & IP','Ventures & Brand','Priority recruiter visibility']},
    {id:'pro',name:'Pro',price:15,c:'var(--blue)',tag:'MOST POPULAR',features:['All 10 CV sections','Unlimited hashtags','Unlimited knowledge items','💰 Sell knowledge (keep 85%)','20 AI credits/month','No-watermark PDF & DOCX','Priority recruiter visibility','Patents, Innovation & Brand'],missing:['Recruiter portal','Custom domain']},
    {id:'creator',name:'Creator',price:29,c:'var(--gold)',tag:'BEST FOR EARNING',features:['Everything in Pro','Keep 92% of sales','50 AI credits/month','⭐ Featured in search','Profile boost included','Custom domain','Full analytics','Early access to new agents'],missing:['Recruiter portal']},
    {id:'enterprise',name:'Enterprise',price:99,c:'var(--purple)',tag:'TEAMS',features:['Everything in Creator','Team dashboard (20 users)','Recruiter portal access','Unlimited AI credits','ATS integration','API access','Dedicated support'],missing:[]},
  ];
  const recPlan = [
    {id:'r1',name:'Starter',price:99,c:'var(--teal)',tag:'',features:['50 candidate unlocks/mo','Hashtag search & filter','Save candidates & pipeline','5 job posts/month','Basic analytics'],missing:[]},
    {id:'r2',name:'Growth',price:299,c:'var(--blue)',tag:'POPULAR',features:['Unlimited unlocks','Advanced hashtag targeting','AI outreach writer','Unlimited job posts','Full analytics & ATS export'],missing:[]},
    {id:'r3',name:'Agency',price:899,c:'var(--purple)',tag:'',features:['Everything in Growth','10 recruiter seats','Client reporting portal','API access','Dedicated account manager'],missing:[]},
  ];
  const plans = state.pricingTab==='pro'?proPlan:recPlan;
  return `
<div style="background:var(--bg);padding:40px 24px;min-height:100vh">
  <div style="max-width:1100px;margin:0 auto">
    <div style="text-align:center;margin-bottom:36px">
      <div class="section-label" style="margin-bottom:8px">PRICING</div>
      <h2 style="font-size:30px;margin-bottom:10px">Simple, honest pricing</h2>
      <p style="font-size:13px;color:var(--mid);margin-bottom:24px">Start free. Pay only when CVita makes you money.</p>
      <div style="display:inline-flex;background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:4px;gap:4px">
        <div style="padding:8px 24px;border-radius:8px;cursor:pointer;font-size:12px;background:${state.pricingTab==='pro'?'var(--blue)':'transparent'};color:${state.pricingTab==='pro'?'#fff':'var(--mute)'};font-weight:${state.pricingTab==='pro'?700:400};transition:all .15s" onclick="setPricingTab('pro')">For Professionals</div>
        <div style="padding:8px 24px;border-radius:8px;cursor:pointer;font-size:12px;background:${state.pricingTab==='rec'?'var(--blue)':'transparent'};color:${state.pricingTab==='rec'?'#fff':'var(--mute)'};font-weight:${state.pricingTab==='rec'?700:400};transition:all .15s" onclick="setPricingTab('rec')">For Recruiters</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(${plans.length},1fr);gap:14px;margin-bottom:32px">
      ${plans.map(plan=>{const popular=['MOST POPULAR','POPULAR','BEST FOR EARNING'].includes(plan.tag);return`
      <div style="background:var(--surf);border:2px solid ${popular?plan.c:'var(--brd)'};border-radius:14px;overflow:hidden;box-shadow:${popular?`0 4px 24px ${plan.c}22`:'none'}">
        ${plan.tag?`<div style="background:${plan.c};padding:5px;text-align:center;font-size:9px;font-weight:700;color:#fff;letter-spacing:1px">${plan.tag}</div>`:''}
        <div style="padding:22px">
          <div style="font-size:13px;font-weight:700;color:${plan.c};margin-bottom:8px">${plan.name}</div>
          <div style="display:flex;align-items:baseline;gap:4px;margin-bottom:20px">
            <span style="font-family:'Playfair Display',serif;font-size:36px;font-weight:900;color:var(--txt)">$${plan.price}</span>
            <span style="font-size:11px;color:var(--mute)">/month</span>
          </div>
          ${plan.features.map(f=>`<div style="display:flex;gap:8px;font-size:11px;color:var(--mid);padding:5px 0;border-bottom:1px solid var(--brd)"><span style="color:var(--green);flex-shrink:0">✓</span>${f}</div>`).join('')}
          ${plan.missing.map(f=>`<div style="display:flex;gap:8px;font-size:11px;color:var(--mute);padding:5px 0;border-bottom:1px solid var(--brd);opacity:.5"><span style="flex-shrink:0">✗</span>${f}</div>`).join('')}
          <button class="btn btn-full" style="padding:11px;margin-top:18px;border:none;font-family:'DM Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;border-radius:8px;background:${popular?`linear-gradient(135deg,${plan.c},${plan.c}cc)`:'var(--card)'};color:${popular?'#fff':'var(--mute)'}" onclick="goto('dashboard')">
            ${plan.name==='Free'?'Start Free':plan.price===99&&state.pricingTab==='pro'?'Contact Sales':`Get ${plan.name}`}
          </button>
        </div>
      </div>`;}).join('')}
    </div>
    <div class="card">
      <div class="section-label" style="margin-bottom:18px">FAQ</div>
      <div class="grid-2">
        ${[['Do I keep my data if I downgrade?','Yes. Your data is always yours. If you downgrade, paid features are hidden but nothing is deleted.'],['When do earnings pay out?','Every Monday. Minimum $20 to trigger. You keep 85% (Pro) or 92% (Creator).'],['Can I cancel anytime?','Yes. No contracts, no fees. Cancel in one click from Settings.'],['How does the recruiter paywall work?','Recruiters pay per candidate unlock. You get notified and can reply directly.']].map(([q,a])=>`
        <div>
          <div style="font-size:12px;font-weight:700;color:var(--txt);margin-bottom:5px">${q}</div>
          <div style="font-size:11px;color:var(--mid);line-height:1.6">${a}</div>
        </div>`).join('')}
      </div>
    </div>
  </div>
</div>`;};

// ─── ACTIONS ───────────────────────────────────────────────────────────────
INITS = {};
function heroSignup(){const e=document.getElementById('hero-email');if(e&&e.value){document.getElementById('hero-success').style.display='flex';}}
function buyBoost(){state.boostBought=true;const b=document.getElementById('boost-banner');if(b)b.innerHTML='<div style="display:flex;align-items:center;gap:8px;padding:8px 20px;background:var(--greenbg);border-bottom:1px solid #10b98144"><span>✅</span><span style="font-size:11px;color:var(--green)">Profile Boosted! You\'ll appear in top 3 recruiter results for 30 days.</span></div>';}
function switchSection(id){state.activeSection=id;document.querySelectorAll('.sidebar-item').forEach(el=>el.classList.remove('active'));const si=document.getElementById('si-'+id);if(si)si.classList.add('active');const sc=document.getElementById('section-content');if(sc)sc.innerHTML=getSectionContent(id);const st=document.getElementById('section-title');if(st)st.textContent=SECTIONS.find(s=>s.id===id)?.icon+' '+id.toUpperCase();const tb=document.getElementById('ai-tips-box');if(tb)tb.style.display='none';}
function runAI(){
  if(state.aiRunning||state.aiCredits<=0)return;
  state.aiRunning=true;state.aiCredits--;
  const btn=document.getElementById('ai-btn');
  if(btn)btn.innerHTML='<span style="display:inline-block;animation:spin 1s linear infinite">⟳</span> AI working…';
  document.getElementById('credit-count')&&(document.getElementById('credit-count').textContent=state.aiCredits);
  setTimeout(()=>{
    state.aiRunning=false;
    const tips=(AI_TIPS[state.activeSection]||AI_TIPS.default);
    const box=document.getElementById('ai-tips-box');
    if(box){box.style.display='flex';document.getElementById('ai-tips-content').innerHTML=tips.map(t=>`<div style="display:flex;gap:9px;font-size:12px;color:var(--mid);margin-bottom:7px;line-height:1.5"><span style="color:var(--green);flex-shrink:0">✦</span>${t}</div>`).join('');}
    if(btn)btn.innerHTML=`🤖 AI Optimise · <span id="credit-count">${state.aiCredits}</span> credits`;
    if(state.aiCredits===0){const nb=document.getElementById('no-credits-box');if(nb)nb.style.display='flex';if(btn)btn.disabled=true;}
  },1800);
}
function toggleCart(id){if(state.cart.includes(id))state.cart=state.cart.filter(x=>x!==id);else state.cart.push(id);goto('market');}
function buyNow(id){state.bought.push(id);state.cart=state.cart.filter(x=>x!==id);goto('market');}
function checkoutAll(){state.bought=[...state.bought,...state.cart];state.cart=[];goto('market');}
function setMarketFilter(f){state.marketFilter=f;goto('market');}
function setJobFilter(f){state.filterJob=f;goto('jobs');}
function toggleSave(id){if(state.saved.includes(id))state.saved=state.saved.filter(x=>x!==id);else state.saved.push(id);goto('jobs');}
function applyJob(id){if(!state.applied.includes(id))state.applied.push(id);goto('jobs');}
function toggleRecTag(tag){if(state.searchTags.includes(tag))state.searchTags=state.searchTags.filter(x=>x!==tag);else state.searchTags.push(tag);goto('recruiter');}
function clearRecTags(){state.searchTags=[];goto('recruiter');}
function unlockCandidate(id){if(state.recCredits<=0)return;state.recCredits--;state.unlocked.push(id);goto('recruiter');}
function setPricingTab(t){state.pricingTab=t;goto('pricing');}
function runAgent(id){
  if(state.agentRunning||state.aiCredits<=0)return;
  state.agentRunning=id;state.aiCredits--;
  const btn=document.getElementById('agent-btn-'+id);
  if(btn){btn.innerHTML='<span style="display:inline-block;animation:spin 1s linear infinite">⟳</span> Running…';btn.disabled=true;}
  setTimeout(()=>{
    const agent=AGENTS.find(a=>a.id===id);
    if(agent){state.agentResults[id]=agent.output;}
    state.agentRunning=null;
    goto('agents');
  },2000);
}
// Boot
goto('landing');
</script>
</body>
</html>
